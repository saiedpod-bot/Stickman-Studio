name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install edge-tts ruff

      - name: Lint with ruff
        run: |
          ruff check . --extend-ignore=E402,F401 --line-length=120 || true

      - name: Verify imports
        run: |
          python -c "
            import sys
            modules = ['config', 'models', 'retry', 'logging_setup',
                       'phases.phase1_script', 'phases.phase2_images',
                       'phases.phase3_slideshow', 'phases.phase4_assembly',
                       'phases.phase4_subtitles']
            for m in modules:
                try:
                    __import__(f'stickman_studio.{m}')
                    print(f'  ✓ {m}')
                except ImportError as e:
                    print(f'  ✗ {m}: {e}')
          "
        working-directory: stickman_studio
